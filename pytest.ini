[pytest]
# =============================================================================
# Pytest Configuration
# =============================================================================
#
# This file configures pytest behavior for the entire project.
#
# Documentation: https://docs.pytest.org/en/stable/reference/customize.html
# =============================================================================

# Test discovery patterns
# -----------------------
# pytest will look for these files when discovering tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
# ----------
# Where to look for tests
testpaths = tests

# Minimum version
# ---------------
minversion = 7.0

# Command-line options
# --------------------
# These options are applied by default when running pytest
addopts =
    # Verbose output (show test names)
    -v

    # Show extra test summary info for all test outcomes
    -ra

    # Show local variables in tracebacks
    --showlocals

    # Strict markers - fail if unknown marker is used
    --strict-markers

    # Coverage options (when pytest-cov is used)
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80

    # Output options
    --tb=short

# Markers
# -------
# Register custom markers for categorizing tests
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (database, external APIs)
    slow: Slow tests (take > 1 second)
    database: Tests that require database connection
    api: Tests for API endpoints
    provider: Tests for job provider integrations

# Asyncio configuration
# ---------------------
asyncio_mode = auto

# Logging
# -------
# Capture log output during tests
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
# --------
# Treat warnings as errors (strict mode)
filterwarnings =
    error
    # Ignore specific warnings
    ignore::sqlalchemy.exc.SAWarning:
    ignore::DeprecationWarning
